<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Protected</title>
</head>
<body>

<div id="login" style="text-align:center; margin-top:120px;">
  <h2>Введите пароль</h2>
  <input type="password" id="pass" />
  <button onclick="check()">Войти</button>
  <p id="err" style="color:red;"></p>
</div>

<div id="content" style="display:none; text-align:center; margin-top:120px;">
  <h1>привет, Мари</h1>
</div>

<script>
  const PASSWORD = "13";

  function check() {
    const val = document.getElementById("pass").value;

    if (val === PASSWORD) {
      localStorage.setItem("auth", "ok");
      showContent();
    } else {
      document.getElementById("err").innerText = "Неверный пароль";
    }
  }

  function showContent() {
    document.getElementById("login").style.display = "none";
    document.getElementById("content").style.display = "block";
  }

  // авторазблокировка
  if (localStorage.getItem("auth") === "ok") {
    showContent();
  }
</script>

</body>
</html>
